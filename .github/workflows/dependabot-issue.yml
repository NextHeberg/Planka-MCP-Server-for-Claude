name: Create Issue on Dependabot Alert

on:
  repository_vulnerability_alert:
    types: [create, reintroduce]

permissions:
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub issue for vulnerability alert
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const alert = context.payload.alert;

            // The event uses "moderate" where our scale uses "medium"
            const rawSeverity = (alert.severity || 'unknown').toLowerCase();
            const severity = rawSeverity === 'moderate' ? 'medium' : rawSeverity;

            const severityEmoji = {
              critical: '🔴',
              high: '🟠',
              medium: '🟡',
              low: '🔵',
            }[severity] || '⚪';

            const pkgName = alert.affected_package_name || 'unknown';
            const cveId = alert.external_identifier || null;
            const ghsaId = alert.ghsa_id || null;
            const advisoryUrl = alert.external_reference || null;
            const alertsUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/security/dependabot`;
            const identifier = cveId || ghsaId || 'unknown';
            const title = `[Security] [${severity.toUpperCase()}] ${pkgName} - ${identifier}`;

            // Ensure all required labels exist (ignore 422 if already present)
            const labelsToCreate = [
              { name: 'security',   color: 'e11d48', description: 'Security-related issue' },
              { name: 'dependabot', color: '0075ca', description: 'Opened by or related to Dependabot' },
              { name: 'critical',   color: '7f1d1d', description: 'Critical severity' },
              { name: 'high',       color: 'ea580c', description: 'High severity' },
              { name: 'medium',     color: 'ca8a04', description: 'Medium severity' },
              { name: 'low',        color: '16a34a', description: 'Low severity' },
            ];

            for (const label of labelsToCreate) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              } catch (err) {
                if (err.status !== 422) throw err;
              }
            }

            // Deduplication: skip if an open issue with the same title already exists
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dependabot',
              per_page: 100,
            });

            const duplicate = existingIssues.data.find(issue => issue.title === title);
            if (duplicate) {
              console.log(`Skipping: issue already exists — #${duplicate.number} "${duplicate.title}"`);
              return;
            }

            const rows = [
              `| Package | \`${pkgName}\` |`,
              `| Severity | ${severityEmoji} ${severity.toUpperCase()} |`,
              `| CVE | ${cveId || 'N/A'} |`,
              `| GHSA | ${ghsaId || 'N/A'} |`,
            ];
            if (alert.affected_range) rows.push(`| Affected range | \`${alert.affected_range}\` |`);
            if (alert.fixed_in) rows.push(`| Fixed in | \`${alert.fixed_in}\` |`);

            const links = [`- [View Dependabot Alerts](${alertsUrl})`];
            if (advisoryUrl) links.push(`- [Security Advisory](${advisoryUrl})`);

            const body = [
              '## 🔒 Security Alert',
              '',
              '| Field | Value |',
              '|-------|-------|',
              ...rows,
              '',
              '### Links',
              ...links,
              '',
              '---',
              '*Auto-generated by the dependabot-issue workflow*',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'dependabot', severity],
            });

            console.log(`Issue created: "${title}"`);
