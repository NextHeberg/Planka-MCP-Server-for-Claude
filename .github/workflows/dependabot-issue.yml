name: Create Issue on Dependabot Alert

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  security-events: read

jobs:
  create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub issues for open Dependabot alerts
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const alerts = await github.paginate(
              github.rest.dependabot.listAlertsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              }
            );

            // Ensure all required labels exist (ignore 422 if already present)
            const labelsToCreate = [
              { name: 'security',   color: 'e11d48', description: 'Security-related issue' },
              { name: 'dependabot', color: '0075ca', description: 'Opened by or related to Dependabot' },
              { name: 'critical',   color: '7f1d1d', description: 'Critical severity' },
              { name: 'high',       color: 'ea580c', description: 'High severity' },
              { name: 'medium',     color: 'ca8a04', description: 'Medium severity' },
              { name: 'low',        color: '16a34a', description: 'Low severity' },
            ];

            for (const label of labelsToCreate) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              } catch (err) {
                if (err.status !== 422) throw err;
              }
            }

            for (const alert of alerts) {
              const pkg = alert.dependency.package;
              const advisory = alert.security_advisory;
              const severity = advisory.severity.toLowerCase();

              const severityEmoji = {
                critical: '🔴',
                high: '🟠',
                medium: '🟡',
                low: '🔵',
              }[severity] || '⚪';

              const cveId = advisory.cve_id || 'N/A';
              const title = `[Security] [${severity.toUpperCase()}] ${pkg.name} - ${advisory.summary}`;

              // Deduplication: skip if an open issue with the same title already exists
              const existingIssues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'security,dependabot',
                per_page: 100,
              });

              const duplicate = existingIssues.data.find(issue => issue.title === title);
              if (duplicate) {
                console.log(`Skipping: issue already exists — #${duplicate.number} "${duplicate.title}"`);
                continue;
              }

              const body = [
                '## 🔒 Security Alert',
                '',
                '| Field | Value |',
                '|-------|-------|',
                `| Package | \`${pkg.name}\` (${pkg.ecosystem}) |`,
                `| Severity | ${severityEmoji} ${severity.toUpperCase()} |`,
                `| CVE | ${cveId} |`,
                `| Summary | ${advisory.summary} |`,
                '',
                '### Links',
                `- [View Dependabot Alert](${alert.html_url})`,
                `- [Security Advisory](${advisory.permalink})`,
                '',
                '---',
                '*Auto-generated by the dependabot-issue workflow*',
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['security', 'dependabot', severity],
              });

              console.log(`Issue created: "${title}"`);
            }
