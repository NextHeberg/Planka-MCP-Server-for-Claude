version: '3.8'

services:
  planka-mcp:
    image: ghcr.io/nextheberg/planka-mcp-server-for-claude:latest
    # To build locally instead: comment the image line above and uncomment below
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: planka-mcp
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Optional: custom network if Planka runs in another compose on same host
    # networks:
    #   - planka_network

# networks:
#   planka_network:
#     external: true
#     name: planka_default
